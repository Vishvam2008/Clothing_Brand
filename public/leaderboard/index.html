<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="View global player rankings, match wins, kills, and top earnings on the ArenaX leaderboard.">
  <meta name="theme-color" content="#0a0a0f">
  <title>Leaderboard - ArenaX</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    body {
      padding-top: 60px;
      padding-bottom: 80px;
      background-color: var(--bg-primary);
      min-height: 100vh;
    }

    .main-container {
      max-width: 540px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Tabs */
    .leaderboard-tabs {
      display: flex;
      background: var(--bg-secondary);
      border: 1px solid var(--border-glass);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .leaderboard-tab {
      flex: 1;
      padding: 10px 6px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      text-align: center;
    }

    .leaderboard-tab.active {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
    }

    /* Podium (Top 3) Layout */
    .podium-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 12px;
      margin: 16px 0 32px;
      padding: 0 8px;
    }

    .podium-spot {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .podium-avatar-wrapper {
      position: relative;
      margin-bottom: 12px;
    }

    .podium-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 2px solid;
      background-size: cover;
      background-position: center;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #fff;
    }

    .spot-1st .podium-avatar {
      width: 78px;
      height: 78px;
      border-color: var(--gold);
      box-shadow: 0 0 16px rgba(245, 158, 11, 0.4);
      font-size: 32px;
    }
    .spot-2nd .podium-avatar {
      border-color: #cbd5e1;
      box-shadow: 0 0 12px rgba(203, 213, 225, 0.2);
      font-size: 24px;
    }
    .spot-3rd .podium-avatar {
      border-color: #b45309;
      box-shadow: 0 0 12px rgba(180, 83, 9, 0.2);
      font-size: 24px;
    }

    .crown {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%) rotate(-5deg);
      font-size: 20px;
      z-index: 10;
    }

    .podium-badge {
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 800;
      color: #000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .spot-1st .podium-badge { background: var(--gold); }
    .spot-2nd .podium-badge { background: #cbd5e1; }
    .spot-3rd .podium-badge { background: #b45309; color: #fff; }

    .podium-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      margin-top: 4px;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .podium-val {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--secondary-light);
      margin-top: 2px;
    }

    /* List view (4th +) */
    .leaderboard-list {
      background: var(--bg-secondary);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      padding: 8px;
    }

    .leaderboard-row {
      display: flex;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-glass);
      gap: 12px;
      transition: background-color 0.2s;
    }

    .leaderboard-row:last-child {
      border-bottom: none;
    }

    .row-rank {
      width: 24px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-secondary);
      text-align: center;
    }

    .row-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-glass);
      background-size: cover;
      background-position: center;
      display: grid;
      place-items: center;
      font-weight: 600;
      color: #fff;
      font-size: 14px;
      flex-shrink: 0;
    }

    .row-info {
      flex: 1;
      min-width: 0;
    }

    .row-name {
      font-size: 14.5px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row-details {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    .row-value {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--primary-light);
    }
  </style>
</head>
<body>

  <!-- Top App Navbar -->
  <nav class="navbar">
    <a href="/public/dashboard/" class="navbar-logo">ArenaX</a>
    <div class="navbar-spacer"></div>
    <div class="navbar-actions">
      <!-- Notification Bell -->
      <button class="notification-bell" id="bellBtn" aria-label="Notifications" aria-haspopup="true">
        🔔
        <span class="badge badge-danger" id="bellBadge" style="display:none; position:absolute; top:-2px; right:-2px; padding:0.1rem 0.35rem; font-size:9px;">0</span>
      </button>
      <div class="notif-dropdown" id="notifDropdown" style="position:fixed; top:54px; right:12px; width:320px; background:var(--bg-secondary); border:1px solid var(--border-glass); border-radius:12px; display:none; flex-direction:column; overflow:hidden; box-shadow:var(--shadow-lg); z-index:var(--z-dropdown);"></div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-container">
    
    <!-- Sort tabs -->
    <div class="leaderboard-tabs">
      <button class="leaderboard-tab active" data-sort="earnings">💰 Earnings</button>
      <button class="leaderboard-tab" data-sort="kills">☠️ Kills</button>
      <button class="leaderboard-tab" data-sort="wins">🏆 Wins</button>
      <button class="leaderboard-tab" data-sort="matches">🎮 Matches</button>
    </div>

    <!-- Podium (Top 3 Players) -->
    <div class="podium-container" id="podium">
      <!-- Generated dynamically -->
    </div>

    <!-- Rankings List (4th and beyond) -->
    <div class="section-title">
      <span>Top Players</span>
    </div>
    <div class="leaderboard-list" id="rankingsList">
      <!-- Dynamic list rows -->
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display: none;">
      <!-- Generated dynamically -->
    </div>

  </main>

  <!-- Bottom Navigation Bar -->
  <nav class="bottom-nav">
    <a href="/public/dashboard/" class="bottom-nav-item">
      <span class="nav-icon">🏠</span>
      <span class="nav-label">Home</span>
    </a>
    <a href="/public/tournaments/" class="bottom-nav-item">
      <span class="nav-icon">🏆</span>
      <span class="nav-label">Matches</span>
    </a>
    <a href="/public/wallet/" class="bottom-nav-item">
      <span class="nav-icon">💳</span>
      <span class="nav-label">Wallet</span>
    </a>
    <a href="/public/profile/" class="bottom-nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">Profile</span>
    </a>
  </nav>

  <script type="module">
    import { api } from '/assets/js/api.js';
    import { auth } from '/assets/js/auth.js';
    import { NotificationManager } from '/assets/js/notifications.js';

    const $ = id => document.getElementById(id);

    let currentSort = 'earnings';
    let currentPage = 1;

    // Initialization
    (async () => {
      await auth.init();
      // Leaderboard is public view but we can check auth state to hydrate navbar correctly
      if (auth.isLoggedIn()) {
        const notifMgr = new NotificationManager($('bellBtn'), $('bellBadge'), $('notifDropdown'));
        notifMgr.init();
      } else {
        $('bellBtn').style.display = 'none';
      }

      await loadLeaderboard();

      // Bind tabs
      document.querySelectorAll('.leaderboard-tab').forEach(tab => {
        tab.addEventListener('click', async () => {
          document.querySelectorAll('.leaderboard-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          currentSort = tab.dataset.sort;
          currentPage = 1;
          await loadLeaderboard();
        });
      });
    })();

    async function loadLeaderboard() {
      // Show skeleton
      $('rankingsList').innerHTML = `<div class="skeleton-card" style="height:250px;"></div>`;
      $('podium').innerHTML = `<div class="skeleton-card" style="height:120px; width:100%;"></div>`;

      try {
        const res = await api.get('/leaderboard', { sort_by: currentSort, page: currentPage, limit: 20 });
        const data = res.data || res;
        const leaderboard = data.leaderboard || [];
        const pagination = data.pagination || {};

        renderPodium(leaderboard.slice(0, 3));
        renderList(leaderboard.slice(3));
        renderPagination(pagination);

      } catch (err) {
        console.error(err);
        $('rankingsList').innerHTML = `<div style="text-align:center; padding:30px; color:var(--danger)">Failed to load rankings.</div>`;
      }
    }

    function formatVal(player) {
      if (currentSort === 'earnings') {
        return `₹${parseFloat(player.total_earnings || 0).toFixed(2)}`;
      } else if (currentSort === 'kills') {
        return `${player.total_kills || 0} Kills`;
      } else if (currentSort === 'wins') {
        return `${player.wins || 0} Wins`;
      } else {
        return `${player.matches_played || 0} Matches`;
      }
    }

    function renderPodium(top3) {
      if (top3.length === 0) {
        $('podium').innerHTML = '';
        return;
      }

      // Reorder to 2nd, 1st, 3rd for visual podium layout
      const spots = [null, null, null]; // 2nd, 1st, 3rd
      if (top3[0]) spots[1] = { ...top3[0], rank: 1 };
      if (top3[1]) spots[0] = { ...top3[1], rank: 2 };
      if (top3[2]) spots[2] = { ...top3[2], rank: 3 };

      let podiumHtml = '';
      spots.forEach((player, idx) => {
        if (!player) {
          // Empty column placeholder
          podiumHtml += `<div class="podium-spot" style="visibility:hidden;"></div>`;
          return;
        }

        const is1st = player.rank === 1;
        const spotClass = is1st ? 'spot-1st' : (player.rank === 2 ? 'spot-2nd' : 'spot-3rd');
        const crownHtml = is1st ? `<div class="crown">👑</div>` : '';
        
        let avatarBg = '';
        if (player.avatar_url) {
          avatarBg = `style="background-image: url(${player.avatar_url});"`;
        }

        podiumHtml += `
          <div class="podium-spot ${spotClass}">
            ${crownHtml}
            <div class="podium-avatar-wrapper">
              <div class="podium-avatar" ${avatarBg}>
                ${player.avatar_url ? '' : player.username.charAt(0).toUpperCase()}
              </div>
              <div class="podium-badge">${player.rank}</div>
            </div>
            <div class="podium-name">${player.username}</div>
            <div class="podium-val">${formatVal(player)}</div>
          </div>
        `;
      });

      $('podium').innerHTML = podiumHtml;
    }

    function renderList(rest) {
      if (rest.length === 0) {
        if ($('podium').innerHTML === '') {
          $('rankingsList').innerHTML = `<div style="text-align:center; padding:30px; color:var(--text-secondary)">No ranking data available.</div>`;
        } else {
          $('rankingsList').innerHTML = `<div style="text-align:center; padding:20px; color:var(--text-secondary)">No additional players.</div>`;
        }
        return;
      }

      let listHtml = '';
      rest.forEach((player, idx) => {
        const rank = idx + 4;
        let avatarBg = '';
        if (player.avatar_url) {
          avatarBg = `style="background-image: url(${player.avatar_url});"`;
        }

        listHtml += `
          <div class="leaderboard-row">
            <div class="row-rank">${rank}</div>
            <div class="row-avatar" ${avatarBg}>
              ${player.avatar_url ? '' : player.username.charAt(0).toUpperCase()}
            </div>
            <div class="row-info">
              <div class="row-name">${player.username}</div>
              <div class="row-details">UID: ${player.ff_uid || 'No UID'}</div>
            </div>
            <div class="row-value">${formatVal(player)}</div>
          </div>
        `;
      });

      $('rankingsList').innerHTML = listHtml;
    }

    function renderPagination(pg) {
      const pag = $('pagination');
      if (!pg.pages || pg.pages <= 1) {
        pag.style.display = 'none';
        return;
      }

      pag.style.display = 'flex';
      let html = '';

      for (let i = 1; i <= pg.pages; i++) {
        html += `<button class="page-btn ${i === pg.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      pag.innerHTML = html;

      pag.querySelectorAll('.page-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          currentPage = parseInt(btn.dataset.page, 10);
          await loadLeaderboard();
        });
      });
    }
  </script>
</body>
</html>
