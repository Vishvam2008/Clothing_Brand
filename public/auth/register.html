<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - ArenaX</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="description" content="Join ArenaX – register to compete in Free Fire tournaments and win rewards.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    body {
      font-family: 'Inter', 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 40px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(124,58,237,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 75%, rgba(6,182,212,0.10) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      animation: fadeInUp 0.5s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      padding: 32px 28px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(24px);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      display: block;
    }

    .logo-subtitle {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .col-span-2 {
      grid-column: span 2;
    }

    .error-msg {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--danger);
      align-items: center;
      gap: 8px;
      animation: fadeIn 0.2s ease;
    }

    .error-msg.visible {
      display: flex;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-footer {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-top: 20px;
    }

    .auth-footer a {
      color: var(--primary-light);
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
      color: #fff;
    }

    @media (max-width: 480px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .col-span-2 {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Logo Header -->
      <div class="logo-area">
        <span class="logo-text">ArenaX</span>
        <p class="logo-subtitle">Create your account and claim your glory 🏆</p>
      </div>

      <!-- Error alert -->
      <div class="error-msg" id="errorMsg" role="alert">
        <span>⚠️</span>
        <span id="errorMsgText">An error occurred.</span>
      </div>

      <!-- Registration Form -->
      <form id="registerForm" novalidate>
        <div class="form-grid">

          <!-- Username -->
          <div class="form-group col-span-2">
            <label class="form-label" for="username">Platform Username</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="e.g. shadow_slayer"
              required
            >
            <span class="form-hint">3-20 chars, alphanumeric or underscores.</span>
          </div>

          <!-- Email -->
          <div class="form-group col-span-2">
            <label class="form-label" for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="name@example.com"
              required
            >
          </div>

          <!-- Phone -->
          <div class="form-group col-span-2">
            <label class="form-label" for="phone">Phone Number</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              class="form-input"
              placeholder="10-digit Indian number"
              required
            >
          </div>

          <!-- Password -->
          <div class="form-group col-span-2">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Min 8 chars, letter + number"
                required
              >
            </div>
            <div class="password-strength" id="pwdStrength" style="display:none;">
              <div class="password-strength-bars">
                <div class="password-strength-bar"></div>
                <div class="password-strength-bar"></div>
                <div class="password-strength-bar"></div>
                <div class="password-strength-bar"></div>
              </div>
              <span class="password-strength-label" id="strengthLabel">Weak</span>
            </div>
          </div>

          <!-- Free Fire UID -->
          <div class="form-group">
            <label class="form-label" for="ffUid">Free Fire UID</label>
            <input
              type="text"
              id="ffUid"
              name="ffUid"
              class="form-input"
              placeholder="In-game UID ID"
              required
            >
          </div>

          <!-- Free Fire Username -->
          <div class="form-group">
            <label class="form-label" for="ffUsername">FF Username</label>
            <input
              type="text"
              id="ffUsername"
              name="ffUsername"
              class="form-input"
              placeholder="In-game Name"
              required
            >
          </div>

        </div>

        <div class="form-group col-span-2 mt-4">
          <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
            <span class="btn-text">Register Account</span>
          </button>
        </div>

      </form>

      <div class="auth-footer">
        Already have an account?&nbsp;
        <a href="/public/auth/login.html">Login Here</a>
      </div>

    </div>
  </div>

  <script type="module">
    import { api } from '/assets/js/api.js';
    import { toast } from '/assets/js/notifications.js';

    const $ = id => document.getElementById(id);
    const errEl = $('errorMsg');
    const errText = $('errorMsgText');

    function showError(msg) {
      errText.textContent = msg;
      errEl.classList.add('visible');
      errEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideError() {
      errEl.classList.remove('visible');
    }

    // Password strength check
    $('password').addEventListener('input', (e) => {
      const val = e.target.value;
      const strengthEl = $('pwdStrength');
      if (!val) {
        strengthEl.style.display = 'none';
        return;
      }
      strengthEl.style.display = 'block';

      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Za-z]/.test(val)) score++;
      if (/\d/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      strengthEl.setAttribute('data-strength', String(score));
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
      $('strengthLabel').textContent = labels[score] || 'Weak';
    });

    $('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = $('username').value.trim();
      const email = $('email').value.trim();
      const phone = $('phone').value.trim();
      const password = $('password').value;
      const ff_uid = $('ffUid').value.trim();
      const ff_username = $('ffUsername').value.trim();

      // Form validation
      if (!username || username.length < 3) {
        showError('Username must be at least 3 characters.');
        return;
      }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Please provide a valid email address.');
        return;
      }
      if (!phone || !/^[6-9]\d{9}$/.test(phone)) {
        showError('Please enter a valid 10-digit Indian mobile number.');
        return;
      }
      if (!password || password.length < 8 || !/[A-Za-z]/.test(password) || !/\d/.test(password)) {
        showError('Password must be at least 8 characters and contain letters and numbers.');
        return;
      }
      if (!ff_uid) {
        showError('Free Fire UID is required.');
        return;
      }
      if (!ff_username) {
        showError('Free Fire Username is required.');
        return;
      }

      const submitBtn = $('submitBtn');
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      try {
        await api.post('/auth/register', {
          username,
          email,
          phone,
          password,
          ff_uid,
          ff_username
        });

        toast.success('Registration successful! Redirecting to login...');
        setTimeout(() => {
          window.location.href = '/public/auth/login.html?registered=1';
        }, 1500);
      } catch (err) {
        showError(err.message || 'Registration failed. Please check details and try again.');
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
