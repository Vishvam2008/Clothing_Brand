<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - ArenaX</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#7c3aed">
  <meta name="description" content="Reset your password on ArenaX.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <style>
    body {
      font-family: 'Inter', 'Outfit', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(124,58,237,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .auth-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      animation: fadeInUp 0.5s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .auth-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(24px);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      display: block;
    }

    .logo-subtitle {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .error-msg {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--danger);
      gap: 8px;
    }

    .error-msg.visible {
      display: flex;
    }

    .auth-footer {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-top: 20px;
    }

    .auth-footer a {
      color: var(--primary-light);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="logo-area">
        <span class="logo-text">ArenaX</span>
        <p class="logo-subtitle">Choose New Password</p>
      </div>

      <!-- Error alert -->
      <div class="error-msg" id="errorMsg">
        <span>⚠️</span>
        <span id="errorMsgText">Invalid token or details.</span>
      </div>

      <!-- Form -->
      <form id="resetForm">
        <input type="hidden" id="token" name="token">

        <!-- New Password -->
        <div class="form-group">
          <label class="form-label" for="password">New Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-input"
            placeholder="Min 8 chars, letter + number"
            required
          >
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            class="form-input"
            placeholder="Confirm new password"
            required
          >
        </div>

        <button type="submit" class="btn btn-primary btn-full mt-4" id="submitBtn">
          Update Password
        </button>
      </form>

      <div class="auth-footer">
        <a href="/public/auth/login.html">Cancel and Login</a>
      </div>

    </div>
  </div>

  <script type="module">
    import { api } from '/assets/js/api.js';
    import { toast } from '/assets/js/notifications.js';

    const $ = id => document.getElementById(id);

    // Read token from URL params
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    if (token) {
      $('token').value = token;
    } else {
      $('errorMsgText').textContent = 'Error: Reset token is missing from url.';
      $('errorMsg').classList.add('visible');
      $('submitBtn').disabled = true;
    }

    $('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('errorMsg').classList.remove('visible');

      const tok = $('token').value;
      const password = $('password').value;
      const confirmPassword = $('confirmPassword').value;

      if (!password || password.length < 8 || !/[A-Za-z]/.test(password) || !/\d/.test(password)) {
        $('errorMsgText').textContent = 'Password must be at least 8 characters and contain letters and numbers.';
        $('errorMsg').classList.add('visible');
        return;
      }

      if (password !== confirmPassword) {
        $('errorMsgText').textContent = 'Passwords do not match.';
        $('errorMsg').classList.add('visible');
        return;
      }

      const submitBtn = $('submitBtn');
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      try {
        await api.post('/auth/reset-password', { token: tok, password });
        toast.success('Password updated successfully! Redirecting...');
        setTimeout(() => {
          window.location.href = '/public/auth/login.html?reset=1';
        }, 1500);
      } catch (err) {
        $('errorMsgText').textContent = err.message || 'Reset failed. Token might be expired.';
        $('errorMsg').classList.add('visible');
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
