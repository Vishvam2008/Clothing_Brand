<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>APK Version Releases - ArenaX Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <style>
    .apk-release-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }
    @media (min-width: 992px) {
      .apk-release-grid {
        grid-template-columns: 320px 1fr;
      }
    }
    .form-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div class="admin-layout">
    
    <div class="admin-main">
      <main class="admin-content">

        <div class="section-title">
          <span>Android App Version Management</span>
        </div>

        <div class="apk-release-grid">
          
          <!-- Left: Upload new release (Super Admin Only) -->
          <div id="uploadApkSection" style="display: none;">
            <div class="form-card">
              <h3 class="panel-title" style="font-size: 16px; margin-bottom: 16px;">📢 Release New APK Binary</h3>
              <form id="uploadApkForm" enctype="multipart/form-data">
                <div class="form-group">
                  <label class="form-label" for="versionName">Version Name (Semantic)</label>
                  <input type="text" id="versionName" class="form-control" placeholder="E.g. 1.0.4" required pattern="^\\d+\\.\\d+\\.\\d+$">
                </div>
                <div class="form-group">
                  <label class="form-label" for="versionCode">Version Code (Integer)</label>
                  <input type="number" id="versionCode" class="form-control" placeholder="E.g. 5" required min="1">
                </div>
                <div class="form-group">
                  <label class="form-label" for="changelog">Changelog Details</label>
                  <textarea id="changelog" class="form-control" placeholder="What's new in this release..." required style="height: 100px; resize: none;"></textarea>
                </div>
                <div class="form-group">
                  <label class="form-label" for="apkFile">Select APK File</label>
                  <input type="file" id="apkFile" accept=".apk" class="form-control" style="padding: 8px 12px;" required>
                </div>
                <button type="submit" id="uploadBtn" class="btn btn-primary w-full mt-4">🚀 Upload & Release</button>
              </form>
            </div>
          </div>

          <!-- Right: Releases history list -->
          <div>
            <div class="table-container">
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Version Detail</th>
                    <th>Changelog / Release Notes</th>
                    <th>Download Link</th>
                    <th style="text-align: right;">Actions</th>
                  </tr>
                </thead>
                <tbody id="apkTableBody">
                  <tr>
                    <td colspan="4" style="text-align: center; color: var(--text-secondary);">Loading APK versions list...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>

      </main>
    </div>

  </div>

  <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999; pointer-events: none;"></div>

  <script type="module">
    import { api } from '/assets/js/api.js';
    import { adminCore } from '/assets/js/admin-core.js';

    const $ = id => document.getElementById(id);

    function showToast(message, type = 'info') {
      const container = $('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toast.style.background = '#1a1a2e';
      toast.style.border = '1px solid rgba(255,255,255,0.08)';
      toast.style.borderRadius = '10px';
      toast.style.padding = '12px 18px';
      toast.style.color = '#fff';
      toast.style.marginBottom = '10px';
      toast.style.pointerEvents = 'all';
      if (type === 'success') toast.style.borderColor = '#10b981';
      if (type === 'error') toast.style.borderColor = '#ef4444';
      
      container.appendChild(toast);
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Initialize layout
    const admin = adminCore.requireAdmin();
    const isSuper = adminCore.isSuperAdmin();

    if (admin) {
      adminCore.initLayout('apk');
      loadApkVersions();

      if (isSuper) {
        $('uploadApkSection').style.display = 'block';

        // Bind upload submit
        $('uploadApkForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const uploadBtn = $('uploadBtn');
          uploadBtn.disabled = true;
          uploadBtn.textContent = 'Uploading APK (Do not close)...';

          try {
            const fileInput = $('apkFile');
            const file = fileInput.files[0];

            const formData = new FormData();
            formData.append('versionName', $('versionName').value.trim());
            formData.append('versionCode', $('versionCode').value);
            formData.append('changelog', $('changelog').value.trim());
            formData.append('apk', file);

            await api.upload('/admin/apk/upload', formData);
            showToast('APK release uploaded successfully!', 'success');
            
            $('uploadApkForm').reset();
            await loadApkVersions();
          } catch (err) {
            console.error(err);
            showToast(err.message || 'Failed to upload APK.', 'error');
          } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = '🚀 Upload & Release';
          }
        });
      }
    }

    async function loadApkVersions() {
      try {
        const res = await api.get('/admin/apk/versions');
        const list = res.data || res;

        if (list.length === 0) {
          $('apkTableBody').innerHTML = `
            <tr>
              <td colspan="4" style="text-align: center; color: var(--text-secondary); padding: 32px 0;">
                No APK versions uploaded yet.
              </td>
            </tr>`;
          return;
        }

        let html = '';
        list.forEach(v => {
          const badgeHtml = v.is_latest
            ? `<span class="badge badge-approved" style="margin-left:8px;">LATEST</span>`
            : '';

          let actionsHtml = '';
          if (isSuper) {
            actionsHtml = `<button class="btn btn-danger btn-xs delete-btn" data-id="${v.id}">Delete</button>`;
          } else {
            actionsHtml = `<span style="font-size:12px; color:var(--text-secondary)">No actions</span>`;
          }

          html += `
            <tr>
              <td>
                <div style="font-weight: 700; color: #fff;">v${v.version_name} ${badgeHtml}</div>
                <div style="font-size: 11px; color: var(--text-secondary); margin-top: 2px;">Code: ${v.version_code} • ${new Date(v.created_at).toLocaleDateString()}</div>
              </td>
              <td style="white-space: pre-wrap; font-size: 13px;">${v.changelog}</td>
              <td>
                <a href="${v.apk_url}" target="_blank" style="font-size: 12px; color: var(--secondary-light); text-decoration: underline;">
                  Download Binary
                </a>
              </td>
              <td style="text-align: right;">
                ${actionsHtml}
              </td>
            </tr>
          `;
        });
        $('apkTableBody').innerHTML = html;

        // Bind delete action
        if (isSuper) {
          document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              const id = btn.dataset.id;
              if (confirm('Permanently delete this APK release version record? This will delete it from Supabase storage too.')) {
                try {
                  await api.delete(`/admin/apk/${id}`);
                  showToast('APK version deleted.', 'success');
                  await loadApkVersions();
                } catch (err) {
                  showToast(err.message || 'Failed to delete APK version.', 'error');
                }
              }
            });
          });
        }

      } catch (err) {
        console.error(err);
        $('apkTableBody').innerHTML = `<tr><td colspan="4" style="text-align:center; color:var(--danger);">Failed to load versions.</td></tr>`;
      }
    }
  </script>
</body>
</html>
