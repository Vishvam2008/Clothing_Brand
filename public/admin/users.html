<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>User Accounts - ArenaX Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/admin.css">
  <style>
    .controls-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 260px;
    }
    .status-filter {
      width: 160px;
    }
  </style>
</head>
<body>

  <div class="admin-layout">
    
    <div class="admin-main">
      <main class="admin-content">

        <div class="section-title">
          <span>Manage User Accounts</span>
        </div>

        <!-- Controls (Search + Filters) -->
        <div class="controls-row">
          <input type="text" id="searchInput" class="form-control search-box" placeholder="Search by Username, Email, Phone or Free Fire UID...">
          <select id="filterStatus" class="form-control status-filter" style="background: var(--bg-secondary);">
            <option value="">All Statuses</option>
            <option value="active">Active Only</option>
            <option value="banned">Banned Only</option>
          </select>
        </div>

        <!-- Users Table -->
        <div class="table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Free Fire Details</th>
                <th>Status</th>
                <th style="text-align: right;">Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="6" style="text-align: center; color: var(--text-secondary);">Loading user accounts...</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="usersPagination" style="display: none;"></div>

      </main>
    </div>

  </div>

  <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999; pointer-events: none;"></div>

  <script type="module">
    import { api } from '/assets/js/api.js';
    import { adminCore } from '/assets/js/admin-core.js';

    const $ = id => document.getElementById(id);

    let page = 1;
    let search = '';
    let status = '';

    function showToast(message, type = 'info') {
      const container = $('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toast.style.background = '#1a1a2e';
      toast.style.border = '1px solid rgba(255,255,255,0.08)';
      toast.style.borderRadius = '10px';
      toast.style.padding = '12px 18px';
      toast.style.color = '#fff';
      toast.style.marginBottom = '10px';
      toast.style.pointerEvents = 'all';
      if (type === 'success') toast.style.borderColor = '#10b981';
      if (type === 'error') toast.style.borderColor = '#ef4444';
      
      container.appendChild(toast);
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Auth verification
    const admin = adminCore.requireAdmin();
    if (admin) {
      adminCore.initLayout('users');
      loadUsers();

      // Bind search & filter inputs
      $('searchInput').addEventListener('input', (e) => {
        search = e.target.value.trim();
        page = 1;
        loadUsers();
      });

      $('filterStatus').addEventListener('change', (e) => {
        status = e.target.value;
        page = 1;
        loadUsers();
      });
    }

    async function loadUsers() {
      try {
        const res = await api.get('/admin/users', { page, limit: 15, search, status });
        const data = res.data || res;
        const users = data.users || [];
        const pagination = data.pagination || {};

        if (users.length === 0) {
          $('usersTableBody').innerHTML = `
            <tr>
              <td colspan="6" style="text-align: center; color: var(--text-secondary); padding: 32px 0;">
                No user accounts match your search/filter criteria.
              </td>
            </tr>`;
          $('usersPagination').style.display = 'none';
          return;
        }

        let html = '';
        users.forEach(u => {
          const isBanned = u.is_banned;
          const statusBadge = isBanned 
            ? `<span class="badge badge-rejected">Banned</span>` 
            : `<span class="badge badge-approved">Active</span>`;

          const actionBtn = isBanned
            ? `<button class="btn btn-primary btn-xs unban-btn" data-id="${u.id}">Unban</button>`
            : `<button class="btn btn-danger btn-xs ban-btn" data-id="${u.id}">Ban User</button>`;

          html += `
            <tr>
              <td>
                <div style="font-weight: 700; color: #fff;">${u.username}</div>
                <div style="font-size: 11px; color: var(--text-secondary); margin-top: 2px;">ID: ${u.id}</div>
              </td>
              <td>${u.email}</td>
              <td>${u.phone || '<span style="color:var(--text-secondary)">No Phone</span>'}</td>
              <td>
                <div style="font-weight: 600; color: var(--secondary-light);">UID: ${u.ff_uid || 'Not set'}</div>
                <div style="font-size: 11.5px; color: var(--text-secondary); margin-top: 1px;">Name: ${u.ff_username || 'Not set'}</div>
              </td>
              <td>${statusBadge}</td>
              <td style="text-align: right;">
                <div style="display: inline-flex; gap: 8px;">
                  ${actionBtn}
                </div>
              </td>
            </tr>
          `;
        });
        $('usersTableBody').innerHTML = html;

        // Bind ban/unban events
        document.querySelectorAll('.ban-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const uid = btn.dataset.id;
            if (confirm('Are you sure you want to ban this user? They will be locked out of the system.')) {
              try {
                await api.put(`/admin/users/${uid}/ban`);
                showToast('User has been banned.', 'success');
                await loadUsers();
              } catch (err) {
                showToast(err.message || 'Failed to ban user.', 'error');
              }
            }
          });
        });

        document.querySelectorAll('.unban-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const uid = btn.dataset.id;
            try {
              await api.put(`/admin/users/${uid}/unban`);
              showToast('User has been unbanned.', 'success');
              await loadUsers();
            } catch (err) {
              showToast(err.message || 'Failed to unban user.', 'error');
            }
          });
        });

        // Pagination
        if (pagination.pages > 1) {
          $('usersPagination').style.display = 'flex';
          let pagHtml = '';
          for (let i = 1; i <= pagination.pages; i++) {
            pagHtml += `<button class="page-btn ${i === pagination.page ? 'active' : ''}" data-page="${i}">${i}</button>`;
          }
          $('usersPagination').innerHTML = pagHtml;

          $('usersPagination').querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              page = parseInt(btn.dataset.page, 10);
              await loadUsers();
            });
          });
        } else {
          $('usersPagination').style.display = 'none';
        }

      } catch (err) {
        console.error(err);
        showToast('Failed to load user accounts list.', 'error');
      }
    }
  </script>
</body>
</html>
